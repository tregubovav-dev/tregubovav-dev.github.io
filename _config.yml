title: "Delphi Playground"
author: "Alexander Tregubov"
email: "tregubovav.dev@gmail.com" 
description: ""
baseurl: ""
url: "https://tregubovav-dev.github.io"
theme: "minima"

# Build settings
markdown: kramdown
highlighter: rouge
kramdown:
  math_engine: mathjax
  syntax_highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Exclude Marp slide source files from Jekyll build to avoid conflicts with compiled HTML
exclude:
  - "slides/**/*.md"
  - "node_modules"
  - "vendor"
  - "Gemfile"
  - "Gemfile.lock"
